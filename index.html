<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korea DC Map — 국내 데이터센터 공급 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=8748d3e8fc84ffe6545b2678c628d220"></script>
<style>
:root {
  --bg:#0a0c10; --panel:#111418; --border:#1e2530;
  --text:#c8d4e0; --dim:#5a6a7a; --bright:#eef4fa;
  --green:#39ff85; --blue:#3fa4ff; --yellow:#ffe03f; --purple:#c03fff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--border);background:var(--panel);z-index:10;flex-shrink:0}
.logo{font-family:'Space Mono',monospace;font-size:13px;color:var(--green);letter-spacing:2px}
.logo em{color:var(--dim);font-style:normal}
.hstats{display:flex;gap:24px}
.hv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--green);line-height:1}
.hl{font-size:10px;color:var(--dim);letter-spacing:1px;margin-top:2px}
.hbadge{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);background:var(--border);padding:4px 10px;border-radius:2px}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:250px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.s-sec{padding:14px;border-bottom:1px solid var(--border)}
.s-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.search-box{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:7px 10px;border-radius:2px;outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--green)}
.search-box::placeholder{color:var(--dim)}
.filter-item{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:5px 6px;border-radius:2px;transition:background .15s;margin-bottom:3px}
.filter-item:hover{background:var(--border)}
.filter-left{display:flex;align-items:center;gap:7px}
.fdot{width:9px;height:9px;border-radius:50%;transition:opacity .2s}
.fname{font-size:12px;transition:opacity .2s}
.fcount{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim)}
.filter-item.off .fdot,.filter-item.off .fname{opacity:.25}
.legend-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);margin-bottom:4px}
.lc{border-radius:50%;opacity:.8;flex-shrink:0}
.list-hdr{padding:10px 14px 6px;display:flex;justify-content:space-between;align-items:center}
.lhl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.lhc{font-family:'Space Mono',monospace;font-size:11px;color:var(--green)}
.dc-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.dc-item{padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.dc-item:hover{background:rgba(57,255,133,.04)}
.dc-item.sel{background:rgba(57,255,133,.08);border-left:2px solid var(--green);padding-left:12px}
.dc-nm{font-size:12px;font-weight:500;color:var(--bright);margin-bottom:2px}
.dc-mt{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim)}
.dc-op{font-size:11px;color:var(--dim);margin-bottom:1px}
.map-wrap{position:relative;flex:1;overflow:hidden}
#map{width:100%;height:100%}
.popup{position:absolute;right:16px;top:16px;width:300px;background:var(--panel);border:1px solid var(--border);border-radius:3px;z-index:5;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.popup-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.pbadge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 7px;border-radius:2px;margin-bottom:5px;display:inline-block}
.pname{font-size:14px;font-weight:700;color:var(--bright)}
.pclose{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:0 3px;line-height:1}
.pclose:hover{color:var(--bright)}
.popup-body{padding:12px 14px}
.prow{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.prow:last-child{border-bottom:none}
.pk{color:var(--dim);flex-shrink:0}
.pv{color:var(--bright);font-weight:500;text-align:right;word-break:break-all}
.pv.hi{font-family:'Space Mono',monospace;color:var(--green);font-size:13px}
.pv.pue{color:var(--blue);font-family:'Space Mono',monospace}
.pnote{padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);line-height:1.6}
</style>
</head>

    <div class="dc-list" id="dc-list"></div>

  <div class="map-wrap">

</div>

const STATUS_COLORS = {
  '운영중':'#39ff85','구축중':'#3fa4ff','사업화 추진':'#ffe03f','초기/Pending':'#c03fff'
};
let activeStatuses = new Set(Object.keys(STATUS_COLORS));
let selectedId = null;
let filtered = [...DATA];
let overlays = {};
let map;

kakao.maps.load(function() {
  const container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(37.45, 127.0),
    level: 8,
  });
  buildFilters();
  buildOverlays();
  applyFilters();
});

function getRadius(mw) {
  if (!mw) return 8;
  if (mw < 10) return 9;
  if (mw < 30) return 13;
  if (mw < 60) return 18;
  return 26;
}

function buildOverlays() {
  DATA.forEach(dc => {
    if (!dc.lat || !dc.lng) return;
    const color = STATUS_COLORS[dc.status] || '#aaa';
    const r = getRadius(dc.mw);
    const div = document.createElement('div');
    div.style.cssText = `width:${r*2}px;height:${r*2}px;border-radius:50%;background:${color}bb;border:2px solid ${color};cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 0 ${r}px ${color}55;`;
    div.title = `${dc.operator} ${dc.name}`;
    div.addEventListener('mouseenter', () => {
      div.style.transform='scale(1.3)';
      div.style.boxShadow=`0 0 ${r*2}px ${color}aa`;
      div.style.zIndex=10;
    });
    div.addEventListener('mouseleave', () => {
      if (dc.id !== selectedId) {
        div.style.transform='scale(1)';
        div.style.boxShadow=`0 0 ${r}px ${color}55`;
        div.style.zIndex='';
      }
    });
    div.addEventListener('click', () => selectDC(dc.id));
    const overlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(dc.lat, dc.lng),
      content: div,
      yAnchor: 0.5,
      xAnchor: 0.5,
    });
    overlays[dc.id] = {overlay, div, color, r};
  });
}

function buildFilters() {
  const fl = document.getElementById('filter-list');
  Object.entries(STATUS_COLORS).forEach(([status, color]) => {
    const count = DATA.filter(d => d.status === status).length;
    const div = document.createElement('div');
    div.className = 'filter-item';
    div.innerHTML = `<div class="filter-left"><div class="fdot" style="background:${color}"></div><div class="fname">${status}</div></div><div class="fcount">${count}</div>`;
    div.addEventListener('click', () => {
      if (activeStatuses.has(status)) activeStatuses.delete(status);
      else activeStatuses.add(status);
      div.classList.toggle('off', !activeStatuses.has(status));
      applyFilters();
    });
    fl.appendChild(div);
  });
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  filtered = DATA.filter(dc =>
    activeStatuses.has(dc.status) &&
    (dc.name.toLowerCase().includes(q) ||
     dc.operator.toLowerCase().includes(q) ||
     (dc.sido||'').includes(q) ||
     (dc.district||'').includes(q))
  );
  const filteredIds = new Set(filtered.map(d => d.id));
  DATA.forEach(dc => {
    const o = overlays[dc.id];
    if (!o) return;
    if (filteredIds.has(dc.id)) o.overlay.setMap(map);
    else o.overlay.setMap(null);
  });
  renderList();
  updateStats();
}

function renderList() {
  const list = document.getElementById('dc-list');
  document.getElementById('lcount').textContent = filtered.length;
  list.innerHTML = '';
  filtered.forEach(dc => {
    const div = document.createElement('div');
    div.className = 'dc-item' + (dc.id === selectedId ? ' sel' : '');
    const mwStr = dc.mw ? dc.mw + ' MW' : '-';
    div.innerHTML = `<div class="dc-op">${dc.operator}</div><div class="dc-nm">${dc.name}</div><div class="dc-mt">${dc.sido} ${dc.district} · ${mwStr} · ${dc.status}</div>`;
    div.addEventListener('click', () => selectDC(dc.id));
    list.appendChild(div);
  });
}

function selectDC(id) {
  selectedId = id;
  const dc = DATA.find(d => d.id === id);
  if (!dc) return;
  map.setCenter(new kakao.maps.LatLng(dc.lat, dc.lng));
  map.setLevel(4);
  Object.values(overlays).forEach(o => {
    o.div.style.transform='scale(1)';
    o.div.style.zIndex='';
  });
  const sel = overlays[id];
  if (sel) {
    sel.div.style.transform='scale(1.5)';
    sel.div.style.boxShadow=`0 0 ${sel.r*3}px ${sel.color}cc`;
    sel.div.style.zIndex=20;
  }
  renderList();
  showPopup(dc);
  const items = document.querySelectorAll('.dc-item');
  const idx = filtered.findIndex(d => d.id === id);
  if (items[idx]) items[idx].scrollIntoView({block:'nearest'});
}

function showPopup(dc) {
  const p = document.getElementById('popup');
  const color = STATUS_COLORS[dc.status] || '#aaa';
  const mwStr = dc.mw ? dc.mw + ' MW' : '-';
  const pueStr = dc.pue || '-';
  const note = dc.note && dc.note.length > 5 ? dc.note.substring(0,140)+(dc.note.length>140?'…':'') : '';
  p.style.display = 'block';
  p.innerHTML = `
    <div class="popup-hdr">
      <div>
        <div class="pbadge" style="background:${color}22;color:${color};border:1px solid ${color}44">${dc.status}</div>
        <div class="pname">${dc.operator} ${dc.name}</div>
      </div>
      <button class="pclose" onclick="closePopup()">×</button>
    </div>
    <div class="popup-body">
      <div class="prow"><span class="pk">Propco</span><span class="pv">${dc.propco}</span></div>
      <div class="prow"><span class="pk">지역</span><span class="pv">${dc.sido} ${dc.district}</span></div>
      <div class="prow"><span class="pk">준공연도</span><span class="pv">${dc.year}</span></div>
      <div class="prow"><span class="pk">유형</span><span class="pv">${dc.prop_type}</span></div>
      <div class="prow"><span class="pk">IT 용량</span><span class="pv hi">${mwStr}</span></div>
      <div class="prow"><span class="pk">설계 PUE</span><span class="pv pue">${pueStr}</span></div>
      <div class="prow"><span class="pk">주소</span><span class="pv" style="font-size:11px">${dc.address}</span></div>
    </div>
    ${note ? `<div class="pnote">${note}</div>` : ''}`;
}

function closePopup() {
  document.getElementById('popup').style.display='none';
  selectedId=null;
  Object.values(overlays).forEach(o=>{o.div.style.transform='scale(1)';o.div.style.zIndex='';});
  renderList();
}

function updateStats() {
  document.getElementById('hc').textContent = filtered.length;
  const mw = filtered.reduce((s,d)=>s+(d.mw||0),0);
  document.getElementById('hm').textContent = Math.round(mw).toLocaleString();
  const ops = new Set(filtered.map(d=>d.operator).filter(o=>o&&o!=='미정'&&o!=='nan'));
  document.getElementById('ho').textContent = ops.size;
}

document.getElementById('search').addEventListener('input', applyFilters);
</script>
